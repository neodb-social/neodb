<svg width="680" viewBox="0 0 680 655" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>How NeoDB instances interconnect</title>
  <desc>NeoDB instances follow, interact and sync catalogs with each other, federate with other ActivityPub servers, and share public posts through relay.neodb.net. Instances write net.neodb records to users' ATProto PDS repos and cross-post to Bluesky; the lexicon is published under the neodb.net handle. Bookhive and Popfeed write records to their users' PDS repos, which flow through the Jetstream event stream; bridge.neodb.net reads Jetstream and feeds the relay.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .container { fill: none; stroke: #D3D1C7; stroke-width: 1; }
    .box { fill: #F1EFE8; stroke: #B4B2A9; stroke-width: 1; }
    .amber { fill: #FAEEDA; stroke: #BA7517; stroke-width: 1; }
    .amber-th { fill: #412402; }
    .amber-ts { fill: #854F0B; }
    .blue { fill: #E6F1FB; stroke: #185FA5; stroke-width: 1; }
    .blue-th { fill: #042C53; }
    .blue-ts { fill: #185FA5; }
    .teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; }
    .teal-th { fill: #04342C; }
    .teal-ts { fill: #0F6E56; }
    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { stroke: #B4B2A9; stroke-width: 1; stroke-dasharray: 4 3; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Containers -->
  <rect x="40" y="40" width="600" height="212" rx="10" class="container"/>
  <text class="th" x="56" y="58">Fediverse — ActivityPub</text>
  <rect x="40" y="354" width="600" height="236" rx="10" class="container"/>
  <text class="th" x="56" y="380">Atmosphere — AT Protocol</text>

  <!-- Fediverse nodes -->
  <rect x="64" y="84" width="130" height="64" rx="8" class="amber"/>
  <text class="th amber-th" x="129" y="111" text-anchor="middle">NeoDB instance</text>
  <text class="ts amber-ts" x="129" y="130" text-anchor="middle">e.g. neodb.social</text>

  <rect x="284" y="84" width="112" height="64" rx="8" class="box"/>
  <text class="th" x="340" y="111" text-anchor="middle">Relay</text>
  <text class="ts" x="340" y="130" text-anchor="middle">relay.neodb.net</text>

  <rect x="486" y="84" width="130" height="64" rx="8" class="amber"/>
  <text class="th amber-th" x="551" y="111" text-anchor="middle">NeoDB instance</text>
  <text class="ts amber-ts" x="551" y="130" text-anchor="middle">your instance</text>

  <rect x="486" y="176" width="130" height="56" rx="8" class="blue"/>
  <text class="th blue-th" x="551" y="200" text-anchor="middle">Mastodon etc.</text>
  <text class="ts blue-ts" x="551" y="218" text-anchor="middle">other AP servers</text>

  <!-- Bridge -->
  <rect x="466" y="282" width="150" height="52" rx="8" class="box"/>
  <text class="th" x="541" y="304" text-anchor="middle">Bridge</text>
  <text class="ts" x="541" y="322" text-anchor="middle">bridge.neodb.net</text>

  <!-- Atmosphere nodes -->
  <rect x="64" y="398" width="150" height="72" rx="8" class="teal"/>
  <text class="th teal-th" x="139" y="425" text-anchor="middle">User's PDS repo</text>
  <text class="ts teal-ts" x="139" y="444" text-anchor="middle">mark · review · profile</text>

  <rect x="274" y="398" width="150" height="56" rx="8" class="teal"/>
  <text class="th teal-th" x="349" y="422" text-anchor="middle">@neodb.net repo</text>
  <text class="ts teal-ts" x="349" y="440" text-anchor="middle">net.neodb.* lexicon</text>

  <rect x="466" y="398" width="150" height="52" rx="8" class="teal"/>
  <text class="th teal-th" x="541" y="420" text-anchor="middle">Jetstream</text>
  <text class="ts teal-ts" x="541" y="438" text-anchor="middle">firehose event stream</text>

  <rect x="466" y="470" width="150" height="44" rx="8" class="teal"/>
  <text class="th teal-th" x="541" y="496" text-anchor="middle">Users' PDS repos</text>

  <rect x="440" y="534" width="92" height="40" rx="8" class="teal"/>
  <text class="th teal-th" x="486" y="558" text-anchor="middle">Bookhive</text>
  <rect x="544" y="534" width="92" height="40" rx="8" class="teal"/>
  <text class="th teal-th" x="590" y="558" text-anchor="middle">Popfeed</text>

  <rect x="64" y="500" width="150" height="48" rx="8" class="teal"/>
  <text class="th teal-th" x="139" y="520" text-anchor="middle">Bluesky</text>
  <text class="ts teal-ts" x="139" y="537" text-anchor="middle">cross-posted skeet</text>

  <!-- Arrows and labels -->
  <path class="arr" d="M129 84 L129 72 L551 72 L551 84" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="64" text-anchor="middle">follow &amp; interact · catalog sync</text>

  <line class="arr" x1="194" y1="116" x2="284" y2="116" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="ts" x="239" y="106" text-anchor="middle">public posts</text>
  <line class="arr" x1="396" y1="116" x2="486" y2="116" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line class="arr" x1="551" y1="148" x2="551" y2="176" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="ts" x="543" y="168" text-anchor="end">follow &amp; interact</text>

  <path class="arr" d="M466 308 L340 308 L340 148" marker-end="url(#arrow)"/>
  <text class="ts" x="403" y="298" text-anchor="middle">bridged posts</text>

  <line class="arr" x1="129" y1="148" x2="129" y2="398" marker-end="url(#arrow)"/>
  <text class="ts" x="140" y="320" text-anchor="start">writes net.neodb.* records</text>

  <line class="leader" x1="274" y1="426" x2="214" y2="426"/>

  <line class="arr" x1="541" y1="398" x2="541" y2="334" marker-end="url(#arrow)"/>
  <text class="ts" x="549" y="372" text-anchor="start">reads</text>

  <line class="arr" x1="541" y1="470" x2="541" y2="450" marker-end="url(#arrow)"/>
  <line class="arr" x1="486" y1="534" x2="486" y2="514" marker-end="url(#arrow)"/>
  <line class="arr" x1="590" y1="534" x2="590" y2="514" marker-end="url(#arrow)"/>
  <line class="arr" x1="139" y1="470" x2="139" y2="500" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="605" width="10" height="10" rx="2" class="amber"/>
  <text class="ts" x="58" y="614" text-anchor="start">NeoDB instances</text>
  <rect x="180" y="605" width="10" height="10" rx="2" class="blue"/>
  <text class="ts" x="198" y="614" text-anchor="start">other AP servers</text>
  <rect x="320" y="605" width="10" height="10" rx="2" class="teal"/>
  <text class="ts" x="338" y="614" text-anchor="start">ATProto apps &amp; repos</text>
  <rect x="490" y="605" width="10" height="10" rx="2" class="box"/>
  <text class="ts" x="508" y="614" text-anchor="start">NeoDB public services</text>
</svg>
